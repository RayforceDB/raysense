name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - "raysense-v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout raysense
        uses: actions/checkout@v4

      - name: Checkout rayforce
        uses: actions/checkout@v4
        with:
          repository: RayforceDB/rayforce
          path: deps/rayforce

      - name: Build rayforce library
        run: make -C deps/rayforce lib

      - name: Test workspace
        run: cargo test
        env:
          RAYFORCE_DIR: deps/rayforce

      - name: Publish raysense-core
        run: cargo publish -p raysense-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RAYFORCE_DIR: deps/rayforce

      - name: Wait for registry index
        run: sleep 30

      - name: Publish raysense
        run: cargo publish -p raysense
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RAYFORCE_DIR: deps/rayforce
