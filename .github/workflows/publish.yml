name: publish

on:
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout raysense
        uses: actions/checkout@v4

      - name: Checkout rayforce
        uses: actions/checkout@v4
        with:
          repository: RayforceDB/rayforce
          path: deps/rayforce

      - name: Build rayforce library
        run: make -C deps/rayforce lib

      - name: Test workspace
        run: cargo test
        env:
          RAYFORCE_DIR: ${{ github.workspace }}/deps/rayforce

      - name: Package raysense-core
        run: cargo package -p raysense-core

      - name: Publish raysense-core
        run: cargo publish -p raysense-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RAYFORCE_DIR: ${{ github.workspace }}/deps/rayforce

      - name: Wait for registry index
        run: sleep 30

      - name: Package raysense
        run: cargo package -p raysense

      - name: Publish raysense
        run: cargo publish -p raysense
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RAYFORCE_DIR: ${{ github.workspace }}/deps/rayforce
