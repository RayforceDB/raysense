name: publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run publish commands with --dry-run where possible"
        required: true
        type: boolean
        default: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout raysense
        uses: actions/checkout@v6

      - name: Checkout rayforce
        uses: actions/checkout@v6
        with:
          repository: RayforceDB/rayforce
          path: deps/rayforce

      - name: Build rayforce library
        run: make -C deps/rayforce lib

      - name: Test workspace
        run: cargo test
        env:
          RAYFORCE_DIR: ${{ github.workspace }}/deps/rayforce

      - name: Package and publish crates
        shell: bash
        run: |
          set -euo pipefail

          dry_run=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            dry_run=true
          fi

          version_of() {
            sed -n 's/^version = "\(.*\)"/\1/p' "crates/$1/Cargo.toml" | head -n 1
          }

          wait_for_crate() {
            local package="$1"
            local version="$2"
            for delay in 10 20 30 60 90; do
              if crate_exists "$package" "$version"; then
                return 0
              fi
              sleep "$delay"
            done
            echo "$package $version did not appear in the registry index in time" >&2
            return 1
          }

          crate_exists() {
            local package="$1"
            local version="$2"
            cargo search "$package" --limit 1 | grep -q "^$package = \"$version\""
          }

          publish_crate() {
            local package="$1"
            local version
            version="$(version_of "$package")"

            if [[ "$dry_run" == "true" ]]; then
              if ! cargo package -p "$package"; then
                echo "::notice::$package package check requires already-published dependency versions"
                return 0
              fi
              if ! cargo publish -p "$package" --dry-run; then
                echo "::notice::$package publish dry run requires already-published dependency versions"
                return 0
              fi
              return 0
            fi

            if crate_exists "$package" "$version"; then
              echo "$package $version is already published"
              return 0
            fi

            cargo package -p "$package"
            cargo publish -p "$package"
            wait_for_crate "$package" "$version"
          }

          publish_crate rayforce-sys
          publish_crate raysense-core
          publish_crate raysense-memory
          publish_crate raysense-cli
          publish_crate raysense
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RAYFORCE_DIR: ${{ github.workspace }}/deps/rayforce

      - name: Post-release smoke
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/raysense/Cargo.toml | head -n 1)"
          smoke_dir="$(mktemp -d)"

          RAYFORCE_DIR="${{ github.workspace }}/deps/rayforce" \
            cargo install raysense --version "$version" --root "$smoke_dir/install"
          "$smoke_dir/install/bin/raysense" rayforce-version

          cargo new "$smoke_dir/library-smoke"
          cd "$smoke_dir/library-smoke"
          cargo add "raysense@$version"
          RAYFORCE_DIR="${{ github.workspace }}/deps/rayforce" cargo check
        env:
          RAYFORCE_DIR: ${{ github.workspace }}/deps/rayforce
