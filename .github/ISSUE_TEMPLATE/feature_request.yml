name: Feature request
description: Suggest a new metric, rule, language, or capability for raysense.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Tell us what you want to build and why.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A short description of the gap or pain point. Concrete examples help.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would the feature look from the CLI / MCP / dashboard surface?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they fall short.
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Which raysense surface does this touch?
      multiple: true
      options:
        - CLI
        - MCP server
        - Live UI
        - Health rules
        - Language plugin
        - Other
