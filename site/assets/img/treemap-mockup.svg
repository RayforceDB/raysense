<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480"
     role="img" aria-labelledby="treemap-title">
  <title id="treemap-title">Raysense treemap dashboard mockup</title>

  <!-- Stand-in for the live dashboard until a real screenshot is dropped here.
       Same color language as the dashboard: navy/teal grid, brand orange for
       hot spots, blue for stable code, transparent for dead code. -->

  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1219"/>
      <stop offset="100%" stop-color="#0a0e13"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#172029" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Window chrome -->
  <rect width="720" height="480" rx="10" fill="url(#bg-grad)"/>
  <rect width="720" height="36" rx="10" fill="#0a0e13"/>
  <rect y="26" width="720" height="10" fill="#0a0e13"/>
  <circle cx="20" cy="18" r="5" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="5" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="5" fill="#27c93f"/>
  <text x="360" y="22" fill="#5b6671" font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="11" text-anchor="middle">raysense . --ui  ·  http://localhost:7000</text>

  <!-- Top status bar -->
  <rect x="16" y="48" width="688" height="40" rx="6" fill="#111820" stroke="#1f2933" stroke-width="1"/>
  <text x="32" y="73" fill="#9eaab8" font-family="Inter, sans-serif" font-size="12" font-weight="600">
    HEALTH
  </text>
  <text x="92" y="73" fill="#5eead4" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600">
    B+
  </text>
  <text x="118" y="73" fill="#5b6671" font-family="JetBrains Mono, monospace" font-size="11">
    78 / 100
  </text>
  <text x="220" y="73" fill="#9eaab8" font-family="Inter, sans-serif" font-size="12" font-weight="600">
    FILES
  </text>
  <text x="262" y="73" fill="#cbd5e1" font-family="JetBrains Mono, monospace" font-size="12">
    142
  </text>
  <text x="320" y="73" fill="#9eaab8" font-family="Inter, sans-serif" font-size="12" font-weight="600">
    CYCLES
  </text>
  <text x="378" y="73" fill="#e9a033" font-family="JetBrains Mono, monospace" font-size="12">
    2
  </text>
  <text x="420" y="73" fill="#9eaab8" font-family="Inter, sans-serif" font-size="12" font-weight="600">
    HOT
  </text>
  <text x="456" y="73" fill="#cbd5e1" font-family="JetBrains Mono, monospace" font-size="12">
    scanner.rs
  </text>
  <text x="560" y="73" fill="#9eaab8" font-family="Inter, sans-serif" font-size="12" font-weight="600">
    BUS FACTOR
  </text>
  <text x="640" y="73" fill="#60a5fa" font-family="JetBrains Mono, monospace" font-size="12">
    1
  </text>

  <!-- Treemap canvas -->
  <rect x="16" y="100" width="688" height="364" rx="6" fill="url(#grid)"/>

  <!-- Treemap rectangles - sized roughly proportionally, labeled, colored by health -->
  <!-- "scanner.rs" - largest, hottest -->
  <g>
    <rect x="22" y="106" width="280" height="180" fill="#e9a033" opacity="0.85" stroke="#0a0e13" stroke-width="2"/>
    <text x="32" y="128" fill="#0a0e13" font-family="Inter, sans-serif" font-size="13" font-weight="700">scanner.rs</text>
    <text x="32" y="146" fill="#0a0e13" font-family="JetBrains Mono, monospace" font-size="10" opacity="0.7">2,158 LOC · cy 47</text>
    <text x="32" y="276" fill="#0a0e13" font-family="JetBrains Mono, monospace" font-size="10" opacity="0.6">load-bearing · churn high</text>
  </g>

  <!-- "health.rs" -->
  <g>
    <rect x="306" y="106" width="200" height="120" fill="#5eead4" opacity="0.65" stroke="#0a0e13" stroke-width="2"/>
    <text x="316" y="128" fill="#0a0e13" font-family="Inter, sans-serif" font-size="12" font-weight="700">health.rs</text>
    <text x="316" y="144" fill="#0a0e13" font-family="JetBrains Mono, monospace" font-size="10" opacity="0.7">1,402 LOC</text>
  </g>

  <!-- "memory.rs" -->
  <g>
    <rect x="510" y="106" width="188" height="120" fill="#60a5fa" opacity="0.55" stroke="#0a0e13" stroke-width="2"/>
    <text x="520" y="128" fill="#0a0e13" font-family="Inter, sans-serif" font-size="12" font-weight="700">memory.rs</text>
    <text x="520" y="144" fill="#0a0e13" font-family="JetBrains Mono, monospace" font-size="10" opacity="0.7">2,058 LOC</text>
  </g>

  <!-- "mcp.rs" -->
  <g>
    <rect x="306" y="230" width="120" height="56" fill="#5eead4" opacity="0.5" stroke="#0a0e13" stroke-width="2"/>
    <text x="316" y="252" fill="#0a0e13" font-family="Inter, sans-serif" font-size="11" font-weight="700">mcp.rs</text>
    <text x="316" y="268" fill="#0a0e13" font-family="JetBrains Mono, monospace" font-size="9" opacity="0.7">2,409 LOC</text>
  </g>

  <!-- "cli.rs" -->
  <g>
    <rect x="430" y="230" width="120" height="56" fill="#60a5fa" opacity="0.45" stroke="#0a0e13" stroke-width="2"/>
    <text x="440" y="252" fill="#0a0e13" font-family="Inter, sans-serif" font-size="11" font-weight="700">cli.rs</text>
  </g>

  <!-- "graph.rs" -->
  <g>
    <rect x="554" y="230" width="144" height="56" fill="#5eead4" opacity="0.4" stroke="#0a0e13" stroke-width="2"/>
    <text x="564" y="252" fill="#0a0e13" font-family="Inter, sans-serif" font-size="11" font-weight="700">graph.rs</text>
  </g>

  <!-- Bottom row: smaller files -->
  <g>
    <rect x="22" y="290" width="100" height="80" fill="#5eead4" opacity="0.35" stroke="#0a0e13" stroke-width="2"/>
    <text x="32" y="312" fill="#cbd5e1" font-family="Inter, sans-serif" font-size="11" font-weight="600">facts.rs</text>
  </g>
  <g>
    <rect x="126" y="290" width="80" height="80" fill="#60a5fa" opacity="0.35" stroke="#0a0e13" stroke-width="2"/>
    <text x="136" y="312" fill="#cbd5e1" font-family="Inter, sans-serif" font-size="11" font-weight="600">profile.rs</text>
  </g>
  <g>
    <rect x="210" y="290" width="92" height="80" fill="#e9a033" opacity="0.4" stroke="#0a0e13" stroke-width="2"/>
    <text x="220" y="312" fill="#cbd5e1" font-family="Inter, sans-serif" font-size="11" font-weight="600">simulate.rs</text>
  </g>
  <g>
    <rect x="22" y="374" width="280" height="84" fill="#1f2933" stroke="#0a0e13" stroke-width="2"/>
    <text x="32" y="396" fill="#5b6671" font-family="Inter, sans-serif" font-size="10" font-weight="600">VENDOR · 38 files</text>
    <text x="32" y="412" fill="#5b6671" font-family="JetBrains Mono, monospace" font-size="9">excluded from health scoring</text>
  </g>
  <g>
    <rect x="306" y="290" width="120" height="80" fill="#60a5fa" opacity="0.35" stroke="#0a0e13" stroke-width="2"/>
    <text x="316" y="312" fill="#cbd5e1" font-family="Inter, sans-serif" font-size="11" font-weight="600">baseline.rs</text>
  </g>
  <g>
    <rect x="430" y="290" width="120" height="80" fill="#5eead4" opacity="0.35" stroke="#0a0e13" stroke-width="2"/>
    <text x="440" y="312" fill="#cbd5e1" font-family="Inter, sans-serif" font-size="11" font-weight="600">sys.rs</text>
  </g>
  <g>
    <rect x="554" y="290" width="144" height="80" fill="#60a5fa" opacity="0.3" stroke="#0a0e13" stroke-width="2"/>
    <text x="564" y="312" fill="#cbd5e1" font-family="Inter, sans-serif" font-size="11" font-weight="600">main.rs · lib.rs</text>
  </g>
  <g>
    <rect x="306" y="374" width="392" height="84" fill="#172029" stroke="#0a0e13" stroke-width="2"/>
    <text x="316" y="396" fill="#5b6671" font-family="Inter, sans-serif" font-size="10" font-weight="600">TESTS · inline mod · 123 tests · 0 failed</text>
    <text x="316" y="412" fill="#5b6671" font-family="JetBrains Mono, monospace" font-size="9">covered: 11/13 modules · gaps: profile.rs, simulate.rs</text>
  </g>
</svg>
