<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- sensor sweep gradient: bright at the origin, fades to transparent at the rim -->
    <radialGradient id="sweep" cx="32" cy="32" r="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background tile -->
  <rect width="64" height="64" rx="12" fill="#0a0e13"/>

  <!-- sensor sweep wedge (12 to 3 o'clock) -->
  <path d="M 32 32 L 32 6 A 26 26 0 0 1 58 32 Z" fill="url(#sweep)"/>

  <!-- pulse rings (range markers) -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.35"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.65"/>

  <!-- origin (the sensor itself) -->
  <circle cx="32" cy="32" r="4" fill="#e9a033"/>

  <!-- detected blip in the swept quadrant -->
  <circle cx="48" cy="20" r="3" fill="#60a5fa"/>
</svg>
